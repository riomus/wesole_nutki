# Values Section
about_values_heading: "Our Core Values"
about_values_subtitle: "The principles that guide everything we do"

about_value_safety_title: "Safety First"
about_value_safety_desc: "We provide a secure, monitored environment where children can explore and grow with confidence."

about_value_creativity_title: "Creative Expression"
about_value_creativity_desc: "Through music, art, and play, we encourage children to express themselves freely and develop their imagination."

