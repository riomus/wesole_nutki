# About Page translations - Polish

# Hero Section
about_page_title: "O Nas"
about_page_subtitle: "Poznaj Wesołe Nutki - miejsce, gdzie każde dziecko odkrywa radość w nauce"

# Mission Section
about_mission_heading: "Nasza Misja"
about_mission_subtitle: "Co napędza nas każdego dnia"
about_mission_content: "W Wesołych Nutkach wierzymy, że każde dziecko ma nieograniczony potencjał. Nasza misja to wspieranie naturalnej ciekawości dzieci i rozwijanie ich talentów poprzez kreatywną zabawę i nowoczesne metody edukacyjne w ciepłej, rodzinnej atmosferze."
about_mission_image_alt: "Dzieci uczące się przez zabawę w Wesołych Nutkach"
about_mission_highlight_1: "Indywidualne podejście do każdego dziecka"
about_mission_highlight_2: "Nauka przez muzykę i języki"
about_mission_highlight_3: "Bezpieczne i wspierające środowisko"
about_mission_highlight_4: "Doświadczeni i pełni pasji pedagodzy"

# Values Section
about_values_heading: "Nasze Wartości"
about_values_subtitle: "Zasady, które kierują wszystkim, co robimy"

about_value_safety_title: "Bezpieczeństwo Przede Wszystkim"
about_value_safety_desc: "Zapewniamy bezpieczne, monitorowane środowisko, w którym dzieci mogą odkrywać i rozwijać się z pewnością siebie."

about_value_creativity_title: "Kreatywna Ekspresja"
about_value_creativity_desc: "Poprzez muzykę, sztukę i zabawę zachęcamy dzieci do swobodnego wyrażania siebie i rozwijania wyobraźni."

about_value_development_title: "Wszechstronny Rozwój"
about_value_development_desc: "Skupiamy się na rozwijaniu całego dziecka - umiejętności poznawczych, emocjonalnych, społecznych i fizycznych."

about_value_community_title: "Silna Społeczność"
about_value_community_desc: "Budujemy trwałe relacje między dziećmi, rodzinami i wychowawcami, tworząc wspierającą sieć."

about_value_respect_title: "Szacunek i Życzliwość"
about_value_respect_desc: "Uczymy dzieci szanować innych, akceptować różnorodność i okazywać życzliwość we wszystkich interakcjach."

about_value_joy_title: "Radość Uczenia Się"
about_value_joy_desc: "Wierzymy, że nauka powinna być radosna, inspirując do odkrywania i eksploracji przez całe życie."

# Facilities Section
about_facilities_heading: "Nasze Obiekty"
about_facilities_subtitle: "Nowoczesne przestrzenie zaprojektowane dla dzieci"

about_facility_classrooms_title: "Jasne Sale"
about_facility_classrooms_desc: "Przestronne, kolorowe pomieszczenia wyposażone w nowoczesne pomoce dydaktyczne i materiały edukacyjne."

about_facility_playground_title: "Bezpieczny Plac Zabaw"
about_facility_playground_desc: "Własny teren zabaw na świeżym powietrzu z bezpiecznym, odpowiednim do wieku sprzętem do aktywnej zabawy."

about_facility_kitchen_title: "Zdrowe Posiłki"
about_facility_kitchen_desc: "Pożywne, domowe posiłki przygotowywane świeżo każdego dnia przez nasz doświadczony zespół kuchenny."

about_facility_rest_title: "Strefy Odpoczynku"
about_facility_rest_desc: "Wygodne przestrzenie do odpoczynku i spokojnych zajęć, zapewniające dzieciom równowagę w ciągu dnia."

# Team Section
about_team_heading: "Poznaj Nasz Zespół"
about_team_subtitle: "Oddani profesjonaliści, którzy dbają o Wasze dzieci"

# Contact Section
about_contact_heading: "Gotowi Do Nas Dołączyć?"
about_contact_subtitle: "Umów się na wizytę, aby zobaczyć nasze przedszkole i poznać nasz zespół. Z przyjemnością powitamy Waszą rodzinę!"
