# Hugo configuration for Wesole Nutki preschool website
# Documentation: https://gohugo.io/getting-started/configuration/

# Base URL for GitHub Pages deployment
# This is overridden by the GitHub Actions workflow using --baseURL flag
# Custom domain configured via static/CNAME - HTTPS is enforced by GitHub Pages
# Custom domain with subdirectory: https://bartusiak.ai/wesole_nutki/
baseURL = "https://bartusiak.ai/wesole_nutki/"
title = "Wesole Nutki"

# Default language
defaultContentLanguage = "pl"
defaultContentLanguageInSubdir = true

# Enable Git info for last modified dates
enableGitInfo = true

# Disable taxonomy pages initially (will be enabled when needed)
disableKinds = []

# Enable robots.txt generation
enableRobotsTXT = true

# Pagination
[pagination]
  pagerSize = 10

# Theme (will be configured when theme is integrated)
# theme = "educenter"

# Summary length for list pages
summaryLength = 70

# Build settings
[build]
  writeStats = true

