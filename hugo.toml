# Site parameters
[params]
  # Site metadata
  author = "Wesołe Nutki"
  description = "Przedszkole Niepubliczne Językowo-Muzyczne Wesołe Nutki we Wrocławiu"

  # Contact information
  phone = "530 114 202"
  email = "przedszkole@wesolenutki.eu"
  address = "Ul. Łaciarska 8, 50-104 Wrocław"

  # Social media (to be configured)
  facebook = "https://www.facebook.com/NutkiWroclaw/"
  instagram = ""

  # Images
  logo = "images/logo.png"
  favicon = "images/favicon.svg"

  # Features
  enableSearch = false

# Menu configuration with nested menu support
# Menus are defined within language sections using the 'main' menu name
# Use 'parent' field to create dropdown menus
# Use 'i18n_key' parameter for translations (falls back to 'name' if not found)

# Permalinks configuration
[permalinks]
  news = "/:section/:year/:month/:slug/"

# Taxonomies
[taxonomies]
  category = "categories"
  tag = "tags"
  gallery_category = "gallery_categories"

# Markup configuration
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = false

# Security settings for Hugo
[security]
  [security.funcs]
    getenv = ["^HUGO_", "^CI$"]

# Output formats
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]

# Media types
[mediaTypes]
  [mediaTypes."application/manifest+json"]
    suffixes = ["webmanifest"]

# Custom output formats
[outputFormats]
  [outputFormats.WebAppManifest]
    mediaType = "application/manifest+json"
    rel = "manifest"

# Image processing configuration
[imaging]
  # Default quality for JPEG/WebP images
  quality = 85
  # Hint for resampling filter - "Lanczos" provides best quality
  resampleFilter = "Lanczos"
  # Anchor point for image cropping
  anchor = "Smart"
  # Background color for images with transparency
  bgColor = "#ffffff"

  [imaging.exif]
    # Disable EXIF data in processed images for privacy
    disableDate = true
    disableLatLong = true
    includeFields = ""
    excludeFields = ""

# Image processing settings in params for template access
[params.images]
  # Enable responsive image generation
  responsive = true
  # Enable WebP format generation
  webp = true
  # Default lazy loading
  lazyLoad = true
  # Responsive image widths (in pixels)
  sizes = [320, 480, 768, 1024, 1280]
  # Default placeholder color
  placeholderColor = "#f5f5f5"
