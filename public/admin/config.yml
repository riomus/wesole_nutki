            media_folder: "/static/images"
            public_folder: "/images"
            choose_url: false
          - label: "Logo alternatywne / Alternative Logo"
            name: "logo_alt"
            widget: "image"
            required: false
            hint: "Alternative logo for dark backgrounds (PNG with transparency)"
            media_folder: "/static/images"
            public_folder: "/images"
            choose_url: false
          - label: "Favicon"
            name: "favicon"
            widget: "image"
            required: false
            hint: "Site favicon (recommended: 32x32px or 64x64px, format: PNG or ICO)"
            media_folder: "/static/images"
            public_folder: "/images"
            choose_url: false
          - label: "Open Graph Image"
            name: "og_image"
            widget: "image"
            required: false
            hint: "Default social sharing image (recommended: 1200x630px, format: JPG)"
            media_folder: "/static/images"
            public_folder: "/images"
            choose_url: false
      - name: global_settings
        label: "Ustawienia globalne / Global Settings"
        file: data/settings.yml
        fields:
          - label: "Tytul strony / Site Title"
            name: "site_title"
            widget: "string"
            hint: "Main title of the website"
          - label: "Opis strony / Site Description"
            name: "site_description"
            widget: "text"
            hint: "Short description of the website for search engines and social media"
          - label: "Slogan / Tagline"
            name: "site_tagline"
            widget: "string"
            required: false
            hint: "A catchy tagline or motto for the site"
          - label: "Dane kontaktowe / Contact Information"
            name: "contact"
            widget: "object"
            fields:
              - {label: "Telefon / Phone", name: "phone", widget: "string", required: false, hint: "Main contact phone number"}
              - {label: "Email", name: "email", widget: "string", required: false, hint: "Main contact email address"}
              - {label: "Adres / Address", name: "address", widget: "string", required: false, hint: "Street address"}
              - {label: "Miasto / City", name: "city", widget: "string", required: false, default: "Wroclaw"}
              - {label: "Kod pocztowy / Postal Code", name: "postal_code", widget: "string", required: false}
              - {label: "Kraj / Country", name: "country", widget: "string", required: false, default: "Polska"}
          - label: "Godziny otwarcia / Opening Hours"
            name: "opening_hours"
            widget: "object"
            fields:
              - {label: "Dni robocze / Weekdays", name: "weekdays", widget: "string", required: false, hint: "e.g., 7:00 - 17:00"}
              - {label: "Sobota / Saturday", name: "saturday", widget: "string", required: false, hint: "e.g., Closed or 8:00 - 12:00"}
              - {label: "Niedziela / Sunday", name: "sunday", widget: "string", required: false, hint: "e.g., Closed"}
          - label: "Media spolecznosciowe / Social Media"
            name: "social_media"
            widget: "object"
            fields:
              - {label: "Facebook", name: "facebook", widget: "string", required: false, hint: "Full Facebook page URL"}
              - {label: "Instagram", name: "instagram", widget: "string", required: false, hint: "Full Instagram profile URL"}
              - {label: "YouTube", name: "youtube", widget: "string", required: false, hint: "Full YouTube channel URL"}
              - {label: "LinkedIn", name: "linkedin", widget: "string", required: false, hint: "Full LinkedIn page URL"}
          - label: "Sekcje strony glownej / Homepage Sections"
            name: "homepage_sections"
            widget: "object"
            hint: "Toggle which sections appear on the homepage"
            fields:
              - {label: "Hero (baner glowny)", name: "hero", widget: "boolean", default: true, hint: "Main hero banner section"}
              - {label: "Rekrutacja / Recruitment", name: "recruitment", widget: "boolean", default: true, hint: "Recruitment announcement section"}
              - {label: "Cechy (Dlaczego my)", name: "features", widget: "boolean", default: true, hint: "Why choose us features section"}
              - {label: "O nas", name: "about", widget: "boolean", default: true, hint: "About us preview section"}
              - {label: "Statystyki", name: "stats", widget: "boolean", default: true, hint: "Statistics/counters section"}
              - {label: "Aktualnosci", name: "news", widget: "boolean", default: true, hint: "Latest news section"}
              - {label: "CTA (wezwanie do dzialania)", name: "cta", widget: "boolean", default: true, hint: "Call to action section"}
          - label: "Ustawienia SEO / SEO Settings"
            name: "seo"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Meta opis / Meta Description", name: "meta_description", widget: "text", required: false, hint: "Default meta description for pages without their own"}
              - {label: "Slowa kluczowe / Keywords", name: "meta_keywords", widget: "string", required: false, hint: "Comma-separated keywords for search engines"}
              - {label: "Google Analytics ID", name: "google_analytics", widget: "string", required: false, hint: "Google Analytics tracking ID (e.g., G-XXXXXXXXXX)"}
              - {label: "Zezwol na indeksowanie / Allow Indexing", name: "allow_indexing", widget: "boolean", default: true, hint: "Allow search engines to index the site"}
          - label: "Ustawienia stopki / Footer Settings"
            name: "footer"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Tekst praw autorskich / Copyright Text", name: "copyright_text", widget: "string", required: false, hint: "Copyright notice (year is added automatically)"}
              - {label: "Pokaz ikony social media / Show Social Icons", name: "show_social_icons", widget: "boolean", default: true}
              - {label: "Pokaz dane kontaktowe / Show Contact Info", name: "show_contact_info", widget: "boolean", default: true}
              - {label: "Pokaz newsletter / Show Newsletter", name: "show_newsletter", widget: "boolean", default: false}
      - name: recruitment_section
        label: "Sekcja rekrutacji / Recruitment Section"
        file: data/homepage/recruitment.yml
        fields:
          - label: "Wlaczona / Enabled"
            name: "enabled"
            widget: "boolean"
            default: true
            hint: "Toggle recruitment section on/off. Use this to easily enable/disable the section when recruitment period ends."
          - label: "Naglowek / Heading"
            name: "heading_key"
            widget: "hidden"
            default: "recruitment_heading"
            hint: "Translation key for heading (i18n)"
          - label: "Ogloszenie / Announcement"
            name: "announcement_key"
            widget: "hidden"
            default: "recruitment_announcement"
            hint: "Translation key for main announcement text (i18n)"
          - label: "Szczegoly / Details"
            name: "details_key"
            widget: "hidden"
            default: "recruitment_details"
            hint: "Translation key for detailed information (i18n)"
          - label: "Dane kontaktowe / Contact Information"
            name: "contact"
            widget: "object"
            hint: "Contact information specific to recruitment (overrides global contact info)"
            fields:
              - {label: "Telefon / Phone", name: "phone", widget: "string", default: "71 343 18 99", hint: "Recruitment contact phone"}
              - {label: "Email", name: "email", widget: "string", default: "przedszkole@wesolenutki.eu", hint: "Recruitment contact email"}
          - label: "Formularz zgloszeniowy / Application Form"
            name: "application_form"
            widget: "object"
            hint: "Application form download and document links"
            fields:
              - label: "Link do pobrania / Download URL"
                name: "download_url"
                widget: "string"
                default: "/documents/karta-zgloszenia.pdf"
                hint: "Direct link to downloadable PDF form (e.g., /documents/enrollment-form.pdf)"
              - label: "Link do strony dokumentow / Documents Page URL"
                name: "documents_page_url"
                widget: "string"
                default: "/pl/documents/"
                required: false
                hint: "Alternative link to documents section page"
              - label: "Etykieta przycisku / Button Label"
                name: "label_key"
                widget: "hidden"
                default: "download_application_form"
                hint: "Translation key for download button label (i18n)"
          - label: "Wezwanie do dzialania / Call to Action"
            name: "cta"
            widget: "object"
            fields:
              - label: "Tekst / Text"
                name: "text_key"
                widget: "hidden"
                default: "recruitment_cta"
                hint: "Translation key for CTA text (i18n)"
              - label: "Styl / Style"
                name: "style"
                widget: "select"
                options: ["primary", "secondary", "accent", "coral", "purple"]
                default: "primary"
                hint: "Color scheme for CTA button"
              - label: "Ikona / Icon"
                name: "icon"
                widget: "select"
                options: ["arrow-right", "none"]
                default: "arrow-right"
                hint: "Icon to display with CTA button"
          - label: "Ustawienia wizualne / Visual Settings"
            name: "visual"
            widget: "object"
            collapsed: true
            hint: "Visual styling options for the recruitment section"
            fields:
              - label: "Styl tla / Background Style"
                name: "background_style"
                widget: "select"
                options: ["gradient", "solid", "pattern"]
                default: "gradient"
                hint: "Background style for the section"
              - label: "Schemat kolorow / Color Scheme"
                name: "color_scheme"
                widget: "select"
                options: ["warm", "primary", "cool", "secondary"]
                default: "warm"
                hint: "Color scheme: warm (coral/pink), primary (green/yellow), cool (mint/lavender), secondary (orange)"
              - label: "Widocznosc / Prominence"
                name: "prominence"
                widget: "select"
                options: ["high", "medium", "normal"]
                default: "high"
                hint: "Visual prominence level - high makes it more attention-grabbing"

