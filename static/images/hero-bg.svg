<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#98D8C8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90EE90;stop-opacity:1" />
    </linearGradient>
    <pattern id="circles" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="20" fill="rgba(255,255,255,0.1)"/>
    </pattern>
  </defs>

  <!-- Background gradient -->
  <rect width="100%" height="100%" fill="url(#bg-gradient)"/>

  <!-- Decorative pattern -->
  <rect width="100%" height="100%" fill="url(#circles)"/>

  <!-- Sun -->
  <circle cx="1600" cy="200" r="100" fill="#FFD700" opacity="0.8"/>
  <circle cx="1600" cy="200" r="80" fill="#FFEB3B"/>

  <!-- Clouds -->
  <g fill="white" opacity="0.9">
    <ellipse cx="300" cy="150" rx="80" ry="40"/>
    <ellipse cx="360" cy="140" rx="60" ry="35"/>
    <ellipse cx="250" cy="145" rx="50" ry="30"/>
  </g>
  <g fill="white" opacity="0.7">
    <ellipse cx="800" cy="100" rx="70" ry="35"/>
    <ellipse cx="850" cy="90" rx="55" ry="30"/>
    <ellipse cx="760" cy="95" rx="45" ry="25"/>
  </g>
  <g fill="white" opacity="0.8">
    <ellipse cx="1200" cy="180" rx="90" ry="45"/>
    <ellipse cx="1270" cy="170" rx="70" ry="40"/>
    <ellipse cx="1140" cy="175" rx="60" ry="35"/>
  </g>

  <!-- Ground/Hills -->
  <ellipse cx="960" cy="1200" rx="1200" ry="400" fill="#7CB342"/>
  <ellipse cx="400" cy="1150" rx="600" ry="300" fill="#8BC34A"/>
  <ellipse cx="1500" cy="1180" rx="700" ry="350" fill="#9CCC65"/>

  <!-- Trees -->
  <g transform="translate(200, 700)">
    <rect x="45" y="100" width="30" height="80" fill="#8B4513"/>
    <circle cx="60" cy="60" r="60" fill="#4CAF50"/>
    <circle cx="30" cy="80" r="40" fill="#66BB6A"/>
    <circle cx="90" cy="80" r="40" fill="#66BB6A"/>
  </g>
  <g transform="translate(1600, 650)">
    <rect x="45" y="100" width="35" height="100" fill="#8B4513"/>
    <circle cx="60" cy="50" r="70" fill="#388E3C"/>
    <circle cx="25" cy="80" r="50" fill="#43A047"/>
    <circle cx="95" cy="80" r="50" fill="#43A047"/>
  </g>

  <!-- Colorful Flowers -->
  <g transform="translate(600, 850)">
    <circle cx="0" cy="0" r="15" fill="#E91E63"/>
    <circle cx="30" cy="10" r="12" fill="#FF9800"/>
    <circle cx="60" cy="5" r="14" fill="#9C27B0"/>
  </g>
  <g transform="translate(1300, 880)">
    <circle cx="0" cy="0" r="12" fill="#F44336"/>
    <circle cx="25" cy="8" r="14" fill="#FFEB3B"/>
    <circle cx="55" cy="3" r="11" fill="#2196F3"/>
  </g>

  <!-- Butterflies -->
  <g transform="translate(500, 400)" fill="#FF69B4">
    <ellipse cx="0" cy="0" rx="20" ry="12" transform="rotate(-30)"/>
    <ellipse cx="25" cy="5" rx="20" ry="12" transform="rotate(30)"/>
    <ellipse cx="12" cy="0" rx="4" ry="8" fill="#4A148C"/>
  </g>
  <g transform="translate(1400, 350)" fill="#FFB74D">
    <ellipse cx="0" cy="0" rx="18" ry="10" transform="rotate(-25)"/>
    <ellipse cx="22" cy="4" rx="18" ry="10" transform="rotate(25)"/>
    <ellipse cx="11" cy="0" rx="3" ry="7" fill="#E65100"/>
  </g>

  <!-- Rainbow (subtle) -->
  <path d="M 100 900 Q 960 400 1820 900" fill="none" stroke="#FF6B6B" stroke-width="15" opacity="0.3"/>
  <path d="M 100 920 Q 960 420 1820 920" fill="none" stroke="#FFE66D" stroke-width="15" opacity="0.3"/>
  <path d="M 100 940 Q 960 440 1820 940" fill="none" stroke="#4ECDC4" stroke-width="15" opacity="0.3"/>
</svg>