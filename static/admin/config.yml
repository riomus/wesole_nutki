            media_folder: "/static/images/pages"
            public_folder: "/images/pages"
          - label: "Sekcje"
            name: "sections"
            widget: "list"
            required: false
            hint: "Dodatkowe sekcje na stronie"
            fields:
              - {label: "Tytul sekcji", name: "title", widget: "string"}
              - {label: "Tresc", name: "content", widget: "markdown"}
