              - {label: "Telefon", name: "phone", widget: "string", required: false}
              - {label: "Email", name: "email", widget: "string", required: false}
              - {label: "Godziny otwarcia", name: "hours", widget: "text", required: false}
          - label: "Mapa"
            name: "map"
            widget: "object"
            required: false
            fields:
              - {label: "Szerokosc geograficzna", name: "latitude", widget: "string", required: false}
              - {label: "Dlugosc geograficzna", name: "longitude", widget: "string", required: false}
