    label: "Static Pages (EN)"
    files:
      - name: about_en
        label: "About Us"
        file: content/en/about/_index.md
        fields:
          - {label: "Title", name: "title", widget: "string", hint: "Page title displayed on the site"}
          - {label: "Description", name: "description", widget: "text", required: false, hint: "Short page description for search engines (SEO)"}
