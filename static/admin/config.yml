        file: content/pl/contact/_index.md
        fields:
          - {label: "Tytul", name: "title", widget: "string", hint: "Tytul strony kontaktowej"}
          - {label: "Opis", name: "description", widget: "text", required: false, hint: "Krotki opis strony dla wyszukiwarek (SEO)"}
          - label: "Obrazek wyrozniajacy"
