# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: riomus/wesole_nutki
  branch: master
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/b61619a5-b054-40c9-960d-b3861a953269/pkce
  auth_token_endpoint: /sites/b61619a5-b054-40c9-960d-b3861a953269/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Publish mode for editorial workflow (optional - enables draft/review/ready states)
publish_mode: editorial_workflow

# Media files configuration
media_folder: static/images
public_folder: /images

# Slug configuration for file naming
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

# Site URL for previews
# Update this when custom domain is configured, or use GitHub Pages URL
site_url: https://bartusiak.ai/wesole_nutki/

# Localization settings
locale: pl


# Image upload guidelines (referenced in collection field hints):
# - Featured images: 1200x630px (2:1 aspect ratio) for social sharing
# - Gallery images: 1600x1200px (4:3 aspect ratio) recommended
# - Team photos: 400x400px (1:1 square) for profile pictures
# - Program images: 800x600px (4:3 aspect ratio) for cards
# - File formats: JPG for photos, PNG for graphics with transparency, SVG for icons
# - File naming: use-lowercase-with-hyphens.jpg (no spaces, no special characters)
# - Max file size: 5MB

# Collections
collections:
  # Navigation Menu Polish
  - name: menu_pl
    label: "Menu nawigacji (PL)"
    files:
      - name: main_menu_pl
        label: "Menu glowne (PL)"
        file: data/menus/main_pl.yml
        fields:
          - label: "Elementy menu"
            name: "items"
            widget: "list"
            allow_add: true
            summary: "{{fields.name}} ({{fields.url}})"
            fields:
              - {label: "Identyfikator", name: "identifier", widget: "string", hint: "Unikalny identyfikator (bez spacji, np. 'about' lub 'programs')"}
              - {label: "Nazwa", name: "name", widget: "string", hint: "Tekst wyswietlany w menu"}
              - {label: "URL", name: "url", widget: "string", hint: "Adres strony (np. /pl/about/) lub # dla menu z podmenu"}
              - {label: "Kolejnosc", name: "weight", widget: "number", default: 10, hint: "Kolejnosc wyswietlania (mniejsza = wczesniej)"}
              - {label: "Klucz tlumaczenia", name: "i18n_key", widget: "string", required: false, hint: "Klucz do pliku tlumaczen (opcjonalny)"}
              - {label: "Link zewnetrzny", name: "external", widget: "boolean", default: false, hint: "Czy link prowadzi do zewnetrznej strony?"}
              - {label: "Otworz w nowej karcie", name: "open_in_new_tab", widget: "boolean", default: false, hint: "Czy otworzyc link w nowej karcie przegladarki?"}
              - label: "Podmenu"
                name: "children"
                widget: "list"
                required: false
                allow_add: true
                summary: "{{fields.name}} ({{fields.url}})"
                hint: "Elementy podmenu (dropdown)"
                fields:
                  - {label: "Identyfikator", name: "identifier", widget: "string", hint: "Unikalny identyfikator podmenu"}
                  - {label: "Nazwa", name: "name", widget: "string", hint: "Tekst wyswietlany w podmenu"}
                  - {label: "URL", name: "url", widget: "string", hint: "Adres strony (np. /pl/programs/schedule/)"}
                  - {label: "Kolejnosc", name: "weight", widget: "number", default: 10, hint: "Kolejnosc wyswietlania w podmenu"}
                  - {label: "Klucz tlumaczenia", name: "i18n_key", widget: "string", required: false, hint: "Klucz do pliku tlumaczen (opcjonalny)"}
                  - {label: "Link zewnetrzny", name: "external", widget: "boolean", default: false, hint: "Czy link prowadzi do zewnetrznej strony?"}
                  - {label: "Otworz w nowej karcie", name: "open_in_new_tab", widget: "boolean", default: false, hint: "Czy otworzyc link w nowej karcie przegladarki?"}

  # Navigation Menu English
  - name: menu_en
    label: "Navigation Menu (EN)"
    files:
      - name: main_menu_en
        label: "Main Menu (EN)"
        file: data/menus/main_en.yml
        fields:
          - label: "Menu Items"
            name: "items"
            widget: "list"
            allow_add: true
            summary: "{{fields.name}} ({{fields.url}})"
            fields:
              - {label: "Identifier", name: "identifier", widget: "string", hint: "Unique identifier (no spaces, e.g., 'about' or 'programs')"}
              - {label: "Name", name: "name", widget: "string", hint: "Text displayed in the menu"}
              - {label: "URL", name: "url", widget: "string", hint: "Page address (e.g., /en/about/) or # for dropdown parent"}
              - {label: "Order", name: "weight", widget: "number", default: 10, hint: "Display order (lower = earlier)"}
              - {label: "Translation Key", name: "i18n_key", widget: "string", required: false, hint: "Key for translation file (optional)"}
              - {label: "External Link", name: "external", widget: "boolean", default: false, hint: "Is this an external link?"}
              - {label: "Open in New Tab", name: "open_in_new_tab", widget: "boolean", default: false, hint: "Open link in new browser tab?"}
              - label: "Submenu"
                name: "children"
                widget: "list"
                required: false
                allow_add: true
                summary: "{{fields.name}} ({{fields.url}})"
                hint: "Submenu items (dropdown)"
                fields:
                  - {label: "Identifier", name: "identifier", widget: "string", hint: "Unique submenu identifier"}
                  - {label: "Name", name: "name", widget: "string", hint: "Text displayed in submenu"}
                  - {label: "URL", name: "url", widget: "string", hint: "Page address (e.g., /en/programs/schedule/)"}
                  - {label: "Order", name: "weight", widget: "number", default: 10, hint: "Display order within submenu"}
                  - {label: "Translation Key", name: "i18n_key", widget: "string", required: false, hint: "Key for translation file (optional)"}
                  - {label: "External Link", name: "external", widget: "boolean", default: false, hint: "Is this an external link?"}
                  - {label: "Open in New Tab", name: "open_in_new_tab", widget: "boolean", default: false, hint: "Open link in new browser tab?"}

  # Polish Pages
  - name: pages_pl
    label: "Strony (PL)"
    label_singular: "Strona"
    folder: content/pl
    create: true
    slug: "{{slug}}"
    filter: {field: "type", value: "page"}
    fields:
      - {label: "Tytul", name: "title", widget: "string"}
      - {label: "Opis", name: "description", widget: "text", required: false}
      - {label: "Data", name: "date", widget: "datetime", required: false}
      - {label: "Wersja robocza", name: "draft", widget: "boolean", default: false}
      - {label: "Typ", name: "type", widget: "hidden", default: "page"}
      - {label: "Tresc", name: "body", widget: "markdown"}

  # English Pages
  - name: pages_en
    label: "Pages (EN)"
    label_singular: "Page"
    folder: content/en
    create: true
    slug: "{{slug}}"
    filter: {field: "type", value: "page"}
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text", required: false}
      - {label: "Date", name: "date", widget: "datetime", required: false}
      - {label: "Draft", name: "draft", widget: "boolean", default: false}
      - {label: "Type", name: "type", widget: "hidden", default: "page"}
      - {label: "Body", name: "body", widget: "markdown"}

  # Polish News
  - name: news_pl
    label: "Aktualnosci (PL)"
    label_singular: "Aktualnosc"
    folder: content/pl/news
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ["date", "title"]
    summary: "{{title}} - {{date | date('YYYY-MM-DD')}}"
    fields:
      - {label: "Tytul", name: "title", widget: "string", hint: "Tytul artykulu wyswietlany na stronie"}
      - {label: "Data publikacji", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: "HH:mm", format: "YYYY-MM-DDTHH:mm:ssZ"}
      - {label: "Wersja robocza", name: "draft", widget: "boolean", default: false, hint: "Zaznacz, aby zapisac jako wersje robocza"}
      - {label: "Jezyk", name: "language", widget: "hidden", default: "pl"}
      - label: "Kategorie"
        name: "categories"
        widget: "list"
        allow_add: true
        hint: "Dodaj kategorie dla tego artykulu (np. Wydarzenia, Zajecia, Wazne)"
        field: {label: "Kategoria", name: "category", widget: "string"}
      - label: "Tagi"
        name: "tags"
        widget: "list"
        allow_add: true
        hint: "Dodaj tagi opisujace artykul"
        field: {label: "Tag", name: "tag", widget: "string"}
      - label: "Obrazek wyrozniajacy"
        name: "featured_image"
        widget: "image"
        required: false
        hint: "Glowny obrazek artykulu (zalecany rozmiar: 1200x630px, format: JPG, max 5MB). Uzywaj nazw plikow z myslnikami bez polskich znakow."
        media_folder: "/static/images/news"
        public_folder: "/images/news"
        choose_url: false
      - {label: "Podsumowanie", name: "summary", widget: "text", required: false, hint: "Krotki opis artykulu wyswietlany na liscie aktualnosci (maks. 200 znakow)"}
      - label: "Tresc"
        name: "body"
        widget: "markdown"
        hint: "Pelna tresc artykulu z formatowaniem"
        buttons: ["bold", "italic", "link", "heading-two", "heading-three", "quote", "bulleted-list", "numbered-list"]
        editor_components: ["image"]

  # English News
  - name: news_en
    label: "News (EN)"
    label_singular: "News Article"
    folder: content/en/news
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ["date", "title"]
    summary: "{{title}} - {{date | date('YYYY-MM-DD')}}"
    fields:
      - {label: "Title", name: "title", widget: "string", hint: "Article title displayed on the site"}
      - {label: "Publish Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: "HH:mm", format: "YYYY-MM-DDTHH:mm:ssZ"}
      - {label: "Draft", name: "draft", widget: "boolean", default: false, hint: "Check to save as draft"}
      - {label: "Language", name: "language", widget: "hidden", default: "en"}
      - label: "Categories"
        name: "categories"
        widget: "list"
        allow_add: true
        hint: "Add categories for this article (e.g., Events, Activities, Important)"
        field: {label: "Category", name: "category", widget: "string"}
      - label: "Tags"
        name: "tags"
        widget: "list"
        allow_add: true
        hint: "Add tags to describe the article"
        field: {label: "Tag", name: "tag", widget: "string"}
      - label: "Featured Image"
        name: "featured_image"
        widget: "image"
        required: false
        hint: "Main article image (recommended: 1200x630px, format: JPG, max 5MB). Use hyphenated lowercase filenames without special characters."
        media_folder: "/static/images/news"
        public_folder: "/images/news"
        choose_url: false
      - label: "Summary"
        name: "summary"
        widget: "text"
        required: false
        hint: "Short description shown in news list (max 200 characters)"
      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Full article content with formatting"
        buttons: ["bold", "italic", "link", "heading-two", "heading-three", "quote", "bulleted-list", "numbered-list"]
        editor_components: ["image"]

  # Polish Gallery
  - name: gallery_pl
    label: "Galeria (PL)"
    label_singular: "Album"
    folder: content/pl/gallery
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Tytul", name: "title", widget: "string"}
      - {label: "Opis galerii", name: "description", widget: "text", required: false}
      - {label: "Data", name: "date", widget: "datetime"}
      - {label: "Wersja robocza", name: "draft", widget: "boolean", default: false}
      - label: "Kategorie"
        name: "categories"
        widget: "list"
        allow_add: true
        field: {label: "Kategoria", name: "category", widget: "string"}
      - label: "Obrazek wyrozniajacy"
        name: "featured_image"
        widget: "image"
        required: false
        hint: "Miniaturka albumu (zalecany rozmiar: 800x600px, format: JPG)"
        media_folder: "/static/images/gallery"
        public_folder: "/images/gallery"
        choose_url: false
      - label: "Zdjecia"
        name: "images"
        widget: "list"
        allow_add: true
        summary: "{{fields.caption}}"
        fields:
          - label: "Zdjecie"
            name: "src"
            widget: "image"
            hint: "Zdjecie galerii (zalecany rozmiar: 1600x1200px, format: JPG, max 5MB)"
            media_folder: "/static/images/gallery"
            public_folder: "/images/gallery"
            choose_url: false
          - {label: "Podpis", name: "caption", widget: "string", required: false, hint: "Krotki opis zdjecia"}
          - {label: "Tekst alternatywny", name: "alt", widget: "string", required: false, hint: "Opis dla osob niedowidzacych i SEO"}
      - {label: "Tresc dodatkowa", name: "body", widget: "markdown", required: false}

  # English Gallery
  - name: gallery_en
    label: "Gallery (EN)"
    label_singular: "Album"
    folder: content/en/gallery
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Gallery Description", name: "description", widget: "text", required: false}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Draft", name: "draft", widget: "boolean", default: false}
      - label: "Categories"
        name: "categories"
        widget: "list"
        allow_add: true
        field: {label: "Category", name: "category", widget: "string"}
      - label: "Featured Image"
        name: "featured_image"
        widget: "image"
        required: false
        hint: "Album thumbnail (recommended: 800x600px, format: JPG)"
        media_folder: "/static/images/gallery"
        public_folder: "/images/gallery"
        choose_url: false
      - label: "Images"
        name: "images"
        widget: "list"
        allow_add: true
        summary: "{{fields.caption}}"
        fields:
          - label: "Image"
            name: "src"
            widget: "image"
            hint: "Gallery image (recommended: 1600x1200px, format: JPG, max 5MB)"
            media_folder: "/static/images/gallery"
            public_folder: "/images/gallery"
            choose_url: false
          - {label: "Caption", name: "caption", widget: "string", required: false, hint: "Short image description"}
          - {label: "Alt Text", name: "alt", widget: "string", required: false, hint: "Description for accessibility and SEO"}
      - {label: "Additional Content", name: "body", widget: "markdown", required: false}

  # Homepage Polish
  - name: homepage_pl
    label: "Strona glowna (PL)"
    files:
      - name: home_pl
        label: "Strona glowna PL"
        file: content/pl/_index.md
        fields:
          - {label: "Tytul", name: "title", widget: "string"}
          - {label: "Opis", name: "description", widget: "text", required: false}
