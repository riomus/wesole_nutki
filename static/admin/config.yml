          - {label: "Body", name: "body", widget: "markdown", required: false}
      - name: contact_en
        label: "Contact"
        file: content/en/contact/_index.md
        fields:
          - {label: "Title", name: "title", widget: "string", hint: "Contact page title"}
          - {label: "Description", name: "description", widget: "text", required: false, hint: "Short page description for search engines (SEO)"}
          - label: "Featured Image"
            name: "featured_image"
            widget: "image"
            required: false
            hint: "Main page image"
            media_folder: "/static/images/pages"
