<!doctype html>
<html lang="pl">
<head>

  <title>404 — Wesołe Nutki</title>
  <style>

  </style>
</head>
<body>
  <main class="wrap">
    <p class="code" aria-hidden="true">404</p>

    <div class="actions">
      <a class="home" id="home" href="/pl/">Strona główna</a>

  <script>
    if(location.pathname.startsWith('/en/')){document.documentElement.lang='en';label.textContent='A missing note';heading.textContent="We couldn't find this page";message.textContent="Return to the homepage or call us — we'll gladly help you find what you need.";home.href='/en/';home.textContent='Homepage';call.textContent='Call: 71 343 18 99'}
  </script>
</body>
</html>
