{{- $data := site.Data.homepage.about -}}
{{- if $data.enabled -}}
{{- $aboutURL := cond (eq .Lang "pl") "/pl/about/" "/en/about/" -}}
<section class="music-experience" id="music-experience">
  <div class="container music-experience-grid">
    <figure class="music-experience-image">
      {{ partial "responsive-image" (dict
        "src" $data.image
        "alt" (i18n $data.image_alt_key)
        "class" "img-fluid"
        "sizes" "(max-width: 767px) 100vw, 48vw"
        "loading" "lazy"
        "context" .
      ) }}
    </figure>
    <div class="music-experience-copy">
      <p class="music-eyebrow">{{ i18n $data.subtitle_key }}</p>
      <h2>{{ i18n $data.heading_key }}</h2>
      <p>{{ i18n $data.content_key }}</p>
      <a href="{{ partial "helpers/basepath-url" $aboutURL }}" class="music-text-link">{{ i18n "hero_about" }} <span aria-hidden="true">→</span></a>
    </div>
  </div>
</section>
{{- end -}}
