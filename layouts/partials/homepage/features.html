{{- $data := site.Data.homepage.features -}}
{{- if $data.enabled -}}
<section class="proof-section" id="features-section">
  <div class="container">
    <div class="music-section-heading">
      <p class="music-eyebrow">Wesołe Nutki</p>
      <h2>{{ i18n $data.heading_key }}</h2>
      <p>{{ i18n $data.subtitle_key }}</p>
    </div>
    <div class="proof-grid">
      {{- range $data.items -}}
      <article class="proof-item">
        <span class="proof-number" aria-hidden="true">{{ .number }}</span>
        <h3>{{ i18n .title_key }}</h3>
        <p>{{ i18n .description_key }}</p>
      </article>
      {{- end -}}
    </div>
  </div>
</section>
{{- end -}}
