{{- $data := site.Data.about.contact -}}
{{- if $data.enabled -}}
<!-- Contact CTA Section -->
<section class="cta-section about-contact-cta" id="contact-cta-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8 text-center">
        <h2>{{ i18n $data.heading_key | default "Get in Touch" }}</h2>
        {{- with $data.subtitle_key -}}
        <p>{{ i18n . }}</p>
        {{- end -}}
        {{- with $data.button -}}
        <a href="{{ "contact" | relLangURL }}" class="btn btn-light btn-lg btn-icon">
          {{ i18n .label_key | default "Contact Us" }}
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8"/>
          </svg>
        </a>
        {{- end -}}
      </div>
    </div>
  </div>
</section>
{{- end -}}
